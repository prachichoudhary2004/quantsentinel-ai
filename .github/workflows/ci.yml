name: CryptoPulse AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest black ruff

    - name: Code Formatting Check (Black)
      run: |
        black --check src/

    - name: Linting Audit (Ruff)
      run: |
        ruff check src/ --ignore E501

    - name: Run Pipeline Execution Test
      run: |
        # Download small synthetic sample or execute pipeline structure
        python src/download_data.py
        python src/bronze_to_silver.py
        python src/silver_to_gold.py
        python src/ml_engine.py
        python src/data_quality.py
        python src/shap_explainer.py
